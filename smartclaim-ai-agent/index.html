<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartClaim AI - 智能理赔管家</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

        :root {
            /* Palette: Glacial Blue */
            --bg-gradient-start: #f0f7ff;
            --bg-gradient-mid: #e0f2fe;
            --bg-gradient-end: #dbeafe;

            --glass-surface: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.8);
            --glass-shadow: rgba(147, 197, 253, 0.25);

            --primary-blue: #3b82f6;
            --primary-dark: #1d4ed8;
            --accent-cyan: #06b6d4;

            --text-main: #1e293b;
            --text-sub: #64748b;
            --text-light: #94a3b8;

            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 12px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            margin: 0;
            overflow: hidden;
            background: linear-gradient(180deg, var(--bg-gradient-start) 0%, var(--bg-gradient-mid) 50%, var(--bg-gradient-end) 100%);
            color: var(--text-main);
            height: 100vh;
        }

        /* Ambient Background blobs */
        .ambient-light {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .blob {
            position: absolute;
            filter: blur(80px);
            opacity: 0.6;
            animation: float 20s infinite ease-in-out;
        }

        .blob-1 {
            top: -10%;
            left: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.2) 0%, transparent 70%);
        }

        .blob-2 {
            bottom: -10%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.2) 0%, transparent 70%);
            animation-delay: -10s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            50% {
                transform: translate(30px, -30px) scale(1.05);
            }
        }

        /* Glass Components */
        .glass-panel {
            background: var(--glass-surface);
            backdrop-filter: blur(24px) saturate(140%);
            -webkit-backdrop-filter: blur(24px) saturate(140%);
            border: 1px solid var(--glass-border);
            box-shadow:
                0 4px 6px -1px rgba(0, 0, 0, 0.01),
                0 10px 30px -5px var(--glass-shadow),
                inset 0 1px 0 rgba(255, 255, 255, 0.9);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: var(--radius-lg);
            box-shadow: 0 4px 20px rgba(148, 163, 184, 0.1);
            transition: transform 0.2s cubic-bezier(0.25, 0.8, 0.25, 1), box-shadow 0.2s;
        }

        .glass-card:active {
            transform: scale(0.98);
        }

        .glass-btn {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 1);
            backdrop-filter: blur(12px);
            color: var(--primary-blue);
            transition: all 0.2s;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.02);
        }

        .glass-btn:hover {
            background: white;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.15);
        }

        .primary-btn {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            border: none;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
            transition: all 0.2s;
        }

        .primary-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
        }

        .primary-btn:active {
            transform: scale(0.97);
        }

        /* Message Bubbles */
        .msg-bubble-ai {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            border-radius: 20px 20px 20px 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
            color: var(--text-main);
        }

        .msg-bubble-user {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            border-radius: 20px 20px 4px 20px;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);
        }

        /* Input Bar */
        .input-dock {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 1);
            border-radius: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
        }

        /* Scrollbar */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Typography */
        h1,
        h2,
        h3 {
            letter-spacing: -0.02em;
        }

        .prose-content {
            font-size: 15px;
            line-height: 1.6;
        }

        .prose-content p {
            margin-bottom: 0.5em;
        }

        .prose-content p:last-child {
            margin-bottom: 0;
        }

        .prose-content strong {
            font-weight: 600;
        }

        .prose-content ul {
            list-style-type: disc;
            padding-left: 1.2em;
            margin: 0.5em 0;
        }

        .msg-bubble-user .prose-content strong {
            color: white;
        }

        .msg-bubble-ai .prose-content strong {
            color: var(--primary-blue);
        }

        /* Utilities */
        .animate-enter {
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>

</head>

<body>
    <div class="ambient-light">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>

</html>
